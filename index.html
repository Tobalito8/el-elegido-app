// ── Share helper ──────────────────────────────────────────────────────────────
function shareCode(code) {
  const url = `${window.location.href.split('?')[0]}?sala=${code}`;
  const msg = `¡Únete a mi sala de El Elegido!
Código: ${code}
${url}`;
  if (navigator.share) {
    navigator.share({
      title: 'El Elegido',
      text: msg
    }).catch(() => {});
  } else {
    navigator.clipboard.writeText(msg).then(() => alert('¡Código copiado al portapapeles!')).catch(() => alert(`Código: ${code}`));
  }
}

  const [gameState, setGameState] = useState(GS.INICIO);
  const [playerName, setPlayerName] = useState('');
  const [roomCode, setRoomCode] = useState('');
  const [roomCodeInput, setRoomCodeInput] = useState('');
  const [roomData, setRoomData] = useState(null);

      localStorage.setItem('playerId', id);
    }
    setMyId(id);
    const saved = localStorage.getItem('playerName');
    if (saved) setPlayerName(saved);
    // Auto-fill code from URL (invite link)
    const params = new URLSearchParams(window.location.search);
    const sala = params.get('sala');
    const savedRoom = localStorage.getItem('roomCode');
    if (sala) {
      setRoomCodeInput(sala.toUpperCase());
    } else if (savedRoom) {
      // We were inside a room before (refresh / app went to background / tab killed).

      setRoomCodeInput(savedRoom);

      try {
        const snap = await window.firebaseGetDoc(ref(code));
        if (snap.exists()) {
          const data = snap.data();
          let ps = [...data.players];
          if (!ps.find(p => p.id === myId)) {
            ps.push({
              id: myId,
              name: playerName,
              isAlive: true
            });
            await upd({
              players: ps
            }, code);
          }
          setRoomCode(code);
          setError('');
        } else {
          localStorage.removeItem('roomCode');

    missingStreakRef.current = 0;
    const roomRef = window.firebaseDoc(window.db, 'rooms', roomCode);
    const unsub = window.firebaseOnSnapshot(roomRef, snap => {
      if (snap.exists()) {
        const data = snap.data();
        setRoomData(data);
        setGameState(data.status);
        if (!data.players.find(p => p.id === myId)) {
          // Require two consecutive misses (debounced) before kicking the player out,
          // to survive transient/cached snapshots right after joining.
          missingStreakRef.current += 1;
          if (missingStreakRef.current >= 2) {
            setError('Fuiste desconectado de la sala.');
            localStorage.removeItem('roomCode');
            setRoomCode('');
            setRoomData(null);
            setGameState(GS.INICIO);
          }
        } else {
          missingStreakRef.current = 0;
        }
      } else {
        setError('La sala fue cerrada por el anfitrión.');
