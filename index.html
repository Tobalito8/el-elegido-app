<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Elegido - Multijugador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
        body { margin:0;padding:0;background:#0a0a14;color:white;font-family:'Crimson Pro',Georgia,serif;user-select:none;-webkit-user-select:none; }
        #root { min-height:100vh;width:100%;display:flex;justify-content:center; }
        .app-container { width:100%;max-width:500px;min-height:100vh;background:#0a0a14;display:flex;flex-direction:column;position:relative; }
        .fade-in { animation:fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .ghost-msg { animation:slideIn 0.3s ease-out;border-left:3px solid #ef4444; }
        @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
        .title-font { font-family:'Cinzel Decorative',serif; }
        .ambient-bg { background:radial-gradient(ellipse at 50% 0%,rgba(99,67,10,.15) 0%,transparent 70%),radial-gradient(ellipse at 80% 80%,rgba(30,27,75,.2) 0%,transparent 60%),#0a0a14; }

        /* Chests */
        .chest-card { transition:transform .6s cubic-bezier(.34,1.56,.64,1); }
        .chest-glow-gold { box-shadow:0 0 30px 8px rgba(251,191,36,.5),0 0 60px 20px rgba(251,191,36,.2);animation:goldPulse 1.5s ease-in-out infinite; }
        @keyframes goldPulse { 0%,100%{box-shadow:0 0 30px 8px rgba(251,191,36,.5),0 0 60px 20px rgba(251,191,36,.2)} 50%{box-shadow:0 0 45px 14px rgba(251,191,36,.7),0 0 80px 30px rgba(251,191,36,.35)} }
        .chest-reveal { animation:chestReveal .8s cubic-bezier(.34,1.56,.64,1) forwards; }
        @keyframes chestReveal { 0%{transform:scale(1) rotate(0deg)} 30%{transform:scale(1.2) rotate(-5deg)} 60%{transform:scale(1.3) rotate(5deg)} 100%{transform:scale(1.1) rotate(0deg)} }
        .turn-indicator { animation:turnPulse 2s ease-in-out infinite; }
        @keyframes turnPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.97)} }

        /* Minigame */
        .tap-btn { transition:all .1s; }
        .tap-btn:active { transform:scale(.92); }
        .countdown-num { animation:countAnim .5s ease-out; }
        @keyframes countAnim { from{opacity:0;transform:scale(2)} to{opacity:1;transform:scale(1)} }
        .go-signal { animation:goAnim .3s cubic-bezier(.34,1.56,.64,1); }
        @keyframes goAnim { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
        .result-row { animation:resultSlide .4s ease-out both; }
        @keyframes resultSlide { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }

        /* Notify */
        .elegido-pulse { animation:elegidoPulse 2s ease-in-out infinite; }
        @keyframes elegidoPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 12px rgba(239,68,68,0)} }

        /* Winner rays */
        .winner-rays { background:conic-gradient(from 0deg,transparent 0deg,rgba(251,191,36,.08) 10deg,transparent 20deg,transparent 30deg,rgba(251,191,36,.08) 40deg,transparent 50deg,transparent 60deg,rgba(251,191,36,.08) 70deg,transparent 80deg,transparent 90deg,rgba(251,191,36,.08) 100deg,transparent 110deg,transparent 120deg,rgba(251,191,36,.08) 130deg,transparent 140deg,transparent 150deg,rgba(251,191,36,.08) 160deg,transparent 170deg,transparent 180deg,rgba(251,191,36,.08) 190deg,transparent 200deg,transparent 210deg,rgba(251,191,36,.08) 220deg,transparent 230deg,transparent 240deg,rgba(251,191,36,.08) 250deg,transparent 260deg,transparent 270deg,rgba(251,191,36,.08) 280deg,transparent 290deg,transparent 300deg,rgba(251,191,36,.08) 310deg,transparent 320deg,transparent 330deg,rgba(251,191,36,.08) 340deg,transparent 350deg,transparent 360deg);animation:rotate 20s linear infinite; }
        @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    </style>
</head>
<body>
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    const firebaseConfig = { apiKey:"AIzaSyAuqx6NzLsOfdYM0FlRDaXXCY77FB2gtUI",authDomain:"el-elegido-juego.firebaseapp.com",projectId:"el-elegido-juego",storageBucket:"el-elegido-juego.firebasestorage.app",messagingSenderId:"183753048942",appId:"1:183753048942:web:37b6660e2e84ed445b777f" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db=db; window.firebaseDoc=doc; window.firebaseSetDoc=setDoc; window.firebaseGetDoc=getDoc; window.firebaseUpdateDoc=updateDoc; window.firebaseOnSnapshot=onSnapshot; window.firebaseDeleteDoc=deleteDoc;
    window.dispatchEvent(new Event('firebaseReady'));
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const GS = {
    INICIO:'inicio', LOBBY:'lobby', JUGANDO:'jugando', VOTACION:'votacion',
    RESULTADOS:'resultados',
    COFRE_NOTIFY:'cofre_notify',       // elegido ve su rol antes de cofres
    COFRE_SETUP:'cofre_setup',         // host elige orden manual o minijuego
    COFRE_MINIJUEGO:'cofre_minijuego', // juego de reacción para el orden
    COFRE_TURNO:'cofre_turno',
    COFRE_FINAL:'cofre_final'
};

// ── Icons ────────────────────────────────────────────────────────────────────
const LockIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15" r="1"/></svg>);
const ExitIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/><path d="M11 5H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h5"/></svg>);
const CrownIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M3 17l3-7 4 5 4-5 3 7H3z"/><path d="M3 17h18"/><path d="M6 10 9 4l3 6 3-6 3 6"/></svg>);
const AwardIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M12 5l2.6 5.3 5.8.8-4.2 4 1 5.8L12 17.8 6.8 21 7.8 15.2 3.6 11.2l5.8-.8L12 5z"/></svg>);
const EyeOffIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><path d="M8 12a4 4 0 0 0 4 4"/><path d="M12 8a4 4 0 0 1 4 4"/><path d="M1 1l22 22"/></svg>);
const UserIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);
const EyeIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>);
const GhostIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M8 7a4 4 0 1 1 8 0v4a6 6 0 0 1-12 0V7a4 4 0 0 1 4-4h0a4 4 0 0 1 4 4v4"/><path d="M8 21c1-1 2-1 4-1s3 0 4 1"/><path d="M9 12h.01M15 12h.01"/></svg>);
const MsgIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8M8 13h5"/></svg>);
const SendIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9 22 2z"/></svg>);
const CheckIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>);
const ShareIcon=({c})=>(<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={c}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>);

// ── Chest SVG ────────────────────────────────────────────────────────────────
const ChestSVG = ({ open, hasMoney, revealed, size=80 }) => {
    const gold = hasMoney && revealed;
    return (
        <svg width={size} height={size} viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="40" cy="74" rx="28" ry="4" fill="rgba(0,0,0,0.4)"/>
            <rect x="8" y="42" width="64" height="30" rx="5" fill={gold?"#92400e":"#374151"}/>
            <rect x="8" y="42" width="64" height="30" rx="5" fill="none" stroke={gold?"#fbbf24":"#6b7280"} strokeWidth="2"/>
            <rect x="8" y="53" width="64" height="8" fill={gold?"#78350f":"#1f2937"}/>
            <rect x="32" y="50" width="16" height="14" rx="3" fill={gold?"#fbbf24":"#4b5563"}/>
            <rect x="36" y="46" width="8" height="8" rx="4" fill="none" stroke={gold?"#fbbf24":"#6b7280"} strokeWidth="2.5"/>
            <g style={{transformOrigin:'40px 42px',transform:open?'rotate(-45deg)':'rotate(0deg)',transition:'transform 0.5s'}}>
                <path d="M8 42 Q8 20 40 18 Q72 20 72 42 Z" fill={gold?"#92400e":"#374151"}/>
                <path d="M8 42 Q8 20 40 18 Q72 20 72 42 Z" fill="none" stroke={gold?"#fbbf24":"#6b7280"} strokeWidth="2"/>
                <path d="M8 33 Q40 30 72 33" stroke={gold?"#78350f":"#1f2937"} strokeWidth="6" fill="none"/>
                {[20,40,60].map(x=>(<circle key={x} cx={x} cy="38" r="3" fill={gold?"#fbbf24":"#6b7280"}/>))}
            </g>
            {gold&&(<>
                <ellipse cx="40" cy="48" rx="14" ry="5" fill="#fbbf24" opacity="0.9"/>
                <ellipse cx="35" cy="46" rx="5" ry="2.5" fill="#f59e0b"/>
                <ellipse cx="45" cy="45" rx="5" ry="2.5" fill="#fbbf24"/>
                <ellipse cx="40" cy="44" rx="6" ry="2.5" fill="#fde68a"/>
            </>)}
        </svg>
    );
};

// ── Share helper ──────────────────────────────────────────────────────────────
function shareCode(code) {
    const url = `${window.location.href.split('?')[0]}?sala=${code}`;
    const msg = `¡Únete a mi sala de El Elegido!\nCódigo: ${code}\n${url}`;
    if (navigator.share) {
        navigator.share({ title:'El Elegido', text: msg }).catch(()=>{});
    } else {
        navigator.clipboard.writeText(msg).then(()=>alert('¡Código copiado al portapapeles!')).catch(()=>alert(`Código: ${code}`));
    }
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
    const [isFirebaseReady, setIsFirebaseReady] = useState(false);
    const [gameState, setGameState] = useState(GS.INICIO);
    const [playerName, setPlayerName] = useState('');
    const [roomCode, setRoomCode] = useState('');
    const [roomCodeInput, setRoomCodeInput] = useState('');
    const [roomData, setRoomData] = useState(null);
    const [myId, setMyId] = useState('');
    const [error, setError] = useState('');
    const [ghostMessage, setGhostMessage] = useState('');
    const [isRevealingRole, setIsRevealingRole] = useState(false);
    const [newGameName, setNewGameName] = useState('');
    const [selectingSwapTarget, setSelectingSwapTarget] = useState(false);
    const chatEndRef = useRef(null);

    useEffect(() => {
        const handleReady = () => setIsFirebaseReady(true);
        if (window.db) setIsFirebaseReady(true);
        else window.addEventListener('firebaseReady', handleReady);
        let id = localStorage.getItem('playerId');
        if (!id) { id = Math.random().toString(36).substring(2,10); localStorage.setItem('playerId', id); }
        setMyId(id);
        const saved = localStorage.getItem('playerName');
        if (saved) setPlayerName(saved);
        // Auto-fill code from URL
        const params = new URLSearchParams(window.location.search);
        const sala = params.get('sala');
        if (sala) setRoomCodeInput(sala.toUpperCase());
        return () => window.removeEventListener('firebaseReady', handleReady);
    }, []);

    useEffect(() => {
        if (!isFirebaseReady || !roomCode || !window.db) return;
        const roomRef = window.firebaseDoc(window.db, 'rooms', roomCode);
        const unsub = window.firebaseOnSnapshot(roomRef, snap => {
            if (snap.exists()) {
                const data = snap.data();
                setRoomData(data);
                setGameState(data.status);
                if (data.status !== GS.LOBBY && !data.players.find(p => p.id === myId)) {
                    setError('Fuiste desconectado de la sala.');
                    setRoomCode(''); setRoomData(null); setGameState(GS.INICIO);
                }
            } else {
                setError('La sala fue cerrada por el anfitrión.');
                setRoomCode(''); setRoomData(null); setGameState(GS.INICIO);
            }
        });
        return () => unsub();
    }, [roomCode, isFirebaseReady, myId]);

    const db = () => window.db;
    const ref = (code) => window.firebaseDoc(window.db, 'rooms', code || roomCode);
    const upd = (data, code) => window.firebaseUpdateDoc(ref(code), data);

    // ── Room actions ──────────────────────────────────────────────────────────
    const createRoom = async () => {
        if (!playerName || !isFirebaseReady) return;
        localStorage.setItem('playerName', playerName);
        const code = Math.random().toString(36).substring(2,6).toUpperCase();
        const data = {
            code, hostId:myId, status:GS.LOBBY,
            players:[{id:myId, name:playerName, isAlive:true}],
            chosenHash:null, votes:{}, lastResult:'', lastVictim:null, victimWasChosen:false,
            ghostMessages:[], games:[], currentGame:null, roundWinner:null, immunePlayerId:null,
            chestOwners:null, chestMoneyIndex:null, chestTurnOrder:null,
            chestCurrentTurnIndex:null, chestWinnerId:null,
            cofreElegidoReady:false, cofreMinijuego:null
        };
        try { await window.firebaseSetDoc(ref(code), data); setRoomCode(code); setError(''); }
        catch(e) { setError("Error al crear sala."); }
    };

    const joinRoom = async () => {
        const code = roomCodeInput.trim().toUpperCase();
        if (!playerName || !code || !isFirebaseReady) return;
        localStorage.setItem('playerName', playerName);
        try {
            const snap = await window.firebaseGetDoc(ref(code));
            if (snap.exists()) {
                const data = snap.data();
                if (data.status !== GS.LOBBY && !data.players.find(p=>p.id===myId)) { setError('La partida ya está en curso.'); return; }
                let ps = [...data.players];
                if (!ps.find(p=>p.id===myId)) { ps.push({id:myId,name:playerName,isAlive:true}); await upd({players:ps},code); }
                setRoomCode(code); setError('');
            } else { setError('Ese código de sala no existe.'); }
        } catch(e) { setError("Error al conectarse."); }
    };

    const exitRoom = async () => {
        if (!window.confirm("¿Seguro que deseas salir? Si eres el creador, la sala se cerrará para todos.")) return;
        if (roomCode && roomData) {
            if (roomData.hostId === myId) await window.firebaseDeleteDoc(ref());
            else await upd({players:roomData.players.filter(p=>p.id!==myId)});
        }
        setRoomCode(''); setRoomData(null); setGameState(GS.INICIO);
    };

    const addGame = async () => {
        if (!newGameName.trim()) return;
        await upd({games:[...(roomData.games||[]), newGameName.trim()]});
        setNewGameName('');
    };
    const removeGame = async (i) => await upd({games:(roomData.games||[]).filter((_,idx)=>idx!==i)});

    const startGame = async () => {
        const alive = roomData.players.filter(p=>p.isAlive);
        if (alive.length < 2) return;
        const chosenId = alive[Math.floor(Math.random()*alive.length)].id;
        const chosenHash = btoa(chosenId+roomCode);
        const game = roomData.games?.length ? roomData.games[Math.floor(Math.random()*roomData.games.length)] : null;
        await upd({status:GS.JUGANDO, chosenHash, votes:{}, ghostMessages:[], currentGame:game, roundWinner:null, immunePlayerId:null});
    };

    const startVoting = async () => await upd({status:GS.VOTACION});

    const castVote = async (targetId) => {
        if (roomData.votes?.[myId] === targetId) return;
        await upd({[`votes.${myId}`]:targetId});
    };

    const sendGhostMessage = async () => {
        if (!ghostMessage.trim()) return;
        const msgs = [...(roomData.ghostMessages||[]), {sender:playerName,text:ghostMessage,time:Date.now()}];
        await upd({ghostMessages:msgs});
        setGhostMessage('');
    };

    const finishVoting = async () => {
        const voteCounts = {};
        Object.values(roomData.votes||{}).forEach(id=>{voteCounts[id]=(voteCounts[id]||0)+1;});
        let maxV=0, tiedIds=[];
        Object.entries(voteCounts).forEach(([id,c])=>{
            if(c>maxV){maxV=c;tiedIds=[id];}else if(c===maxV)tiedIds.push(id);
        });
        let victimId=null, message="", victimWasChosen=false;
        let nextHash=roomData.chosenHash, playersUpdate=roomData.players;
        if (Object.keys(voteCounts).length===0) {
            message="Nadie votó a tiempo.";
        } else if (tiedIds.length>1) {
            message="¡EMPATE! Las votaciones se anularon. Nadie eliminado.";
        } else {
            victimId=tiedIds[0];
            playersUpdate=roomData.players.map(p=>p.id===victimId?{...p,isAlive:false}:p);
            victimWasChosen=btoa(victimId+roomCode)===roomData.chosenHash;
            if (victimWasChosen) {
                message=`¡LO DESCUBRIERON! era ${roomData.players.find(p=>p.id===victimId).name}. Se ha asignado un nuevo Elegido.`;
                const survivors=playersUpdate.filter(p=>p.isAlive);
                if (survivors.length>0){
                    const newChosen=survivors[Math.floor(Math.random()*survivors.length)].id;
                    nextHash=btoa(newChosen+roomCode);
                }
            } else {
                message=`EQUIVOCACIÓN. ${roomData.players.find(p=>p.id===victimId)?.name} fue eliminado pero NO era.`;
            }
        }
        await upd({status:GS.RESULTADOS,lastResult:message,players:playersUpdate,chosenHash:nextHash,lastVictim:victimId,victimWasChosen});
    };

    const handleNextRound = async () => {
        const survivors = roomData.players.filter(p=>p.isAlive);
        if (survivors.length === 3) {
            // Assign chests: elegido gets money chest
            const chosenPlayer = survivors.find(p=>btoa(p.id+roomCode)===roomData.chosenHash);
            if (!chosenPlayer) return;
            const shuffled = [...survivors].sort(()=>Math.random()-.5);
            const chestOwners = shuffled.map(p=>p.id);
            const moneyIdx = chestOwners.indexOf(chosenPlayer.id);
            // Go to COFRE_NOTIFY so the (re)assigned elegido sees their role
            await upd({
                status:GS.COFRE_NOTIFY,
                chestOwners, chestMoneyIndex:moneyIdx,
                chestTurnOrder:null, chestCurrentTurnIndex:0,
                chestWinnerId:null, cofreElegidoReady:false,
                votes:{}, immunePlayerId:null, cofreMinijuego:null
            });
            return;
        }
        if (survivors.length <= 1) {
            await upd({status:GS.LOBBY, players:roomData.players.map(p=>({...p,isAlive:true}))});
        } else {
            const game = roomData.games?.length ? roomData.games[Math.floor(Math.random()*roomData.games.length)] : null;
            await upd({status:GS.JUGANDO, currentGame:game, votes:{}, ghostMessages:[], immunePlayerId:null, lastVictim:null});
        }
    };

    // ── Chest round actions ───────────────────────────────────────────────────
    const elegidoConfirmReady = async () => await upd({cofreElegidoReady:true});

    const proceedToSetup = async () => await upd({status:GS.COFRE_SETUP});

    const setChestTurnOrder = async (order) => {
        await upd({chestTurnOrder:order, chestCurrentTurnIndex:0, status:GS.COFRE_TURNO});
    };

    const startMinijuego = async () => {
        await upd({
            status:GS.COFRE_MINIJUEGO,
            cofreMinijuego:{phase:'countdown', startedAt:Date.now(), goTime:null, taps:{}}
        });
    };

    const triggerGo = async () => {
        await upd({'cofreMinijuego.phase':'go','cofreMinijuego.goTime':Date.now()});
    };

    const recordTap = async () => {
        const goTime = roomData.cofreMinijuego?.goTime;
        if (!goTime) return;
        const rt = Date.now() - goTime;
        await upd({[`cofreMinijuego.taps.${myId}`]:rt});
    };

    const finishMinijuego = async () => {
        const taps = roomData.cofreMinijuego?.taps || {};
        const alive = roomData.players.filter(p=>p.isAlive);
        // Sort by reaction time ascending (fastest = lowest RT = winner → last to pick)
        const sorted = alive
            .map(p=>({id:p.id, rt: taps[p.id] ?? 99999}))
            .sort((a,b)=>a.rt - b.rt);
        // loser (slowest) first, winner (fastest) last
        const order = sorted.map(p=>p.id).reverse();
        await upd({chestTurnOrder:order, chestCurrentTurnIndex:0, status:GS.COFRE_TURNO});
    };

    const keepChest = async () => {
        const nextIdx = (roomData.chestCurrentTurnIndex||0) + 1;
        if (nextIdx >= roomData.chestTurnOrder.length) {
            await upd({status:GS.COFRE_FINAL, chestWinnerId:roomData.chestOwners[roomData.chestMoneyIndex]});
        } else {
            await upd({chestCurrentTurnIndex:nextIdx});
        }
    };

    const swapChest = async (withPlayerId) => {
        const myIdx = roomData.chestOwners.indexOf(myId);
        const theirIdx = roomData.chestOwners.indexOf(withPlayerId);
        if (myIdx===-1||theirIdx===-1) return;
        const newOwners = [...roomData.chestOwners];
        newOwners[myIdx]=withPlayerId; newOwners[theirIdx]=myId;
        const nextIdx=(roomData.chestCurrentTurnIndex||0)+1;
        setSelectingSwapTarget(false);
        if (nextIdx>=roomData.chestTurnOrder.length) {
            await upd({chestOwners:newOwners, status:GS.COFRE_FINAL, chestWinnerId:newOwners[roomData.chestMoneyIndex]});
        } else {
            await upd({chestOwners:newOwners, chestCurrentTurnIndex:nextIdx});
        }
    };

    const backToLobby = async () => {
        await upd({status:GS.LOBBY, players:roomData.players.map(p=>({...p,isAlive:true})),
            chestOwners:null,chestMoneyIndex:null,chestTurnOrder:null,chestCurrentTurnIndex:null,
            chestWinnerId:null,cofreElegidoReady:false,cofreMinijuego:null});
    };

    // ── Derived ───────────────────────────────────────────────────────────────
    if (!isFirebaseReady) return <div className="p-10 text-center animate-pulse text-amber-200">Conectando...</div>;
    if (gameState !== GS.INICIO && !roomData) return <div className="p-10 text-center animate-pulse text-amber-200">Cargando...</div>;

    const amIAlive = roomData?.players.find(p=>p.id===myId)?.isAlive;
    const amIChosen = btoa(myId+roomCode) === roomData?.chosenHash;
    const isHost = roomData?.hostId === myId;
    const alive = roomData?.players.filter(p=>p.isAlive) || [];
    const getName = (id) => roomData?.players.find(p=>p.id===id)?.name || '?';
    const currentTurnPlayerId = roomData?.chestTurnOrder?.[roomData?.chestCurrentTurnIndex];
    const isMyChestTurn = currentTurnPlayerId === myId;

    return (
        <div className="app-container ambient-bg">
            {/* Header */}
            <div className="sticky top-0 p-4 border-b border-amber-900/30 flex justify-between items-center z-50" style={{background:'rgba(10,10,20,0.92)',backdropFilter:'blur(12px)'}}>
                <div className="flex items-center gap-2">
                    <div className="bg-amber-800/60 p-1.5 rounded-lg"><LockIcon c="w-5 h-5 text-amber-400"/></div>
                    <span className="font-black tracking-wider uppercase text-sm title-font text-amber-200" style={{letterSpacing:'.15em'}}>El Elegido</span>
                </div>
                <div className="flex items-center gap-2">
                    {roomCode && (
                        <button onClick={()=>shareCode(roomCode)} className="text-slate-400 hover:text-amber-400 p-2 rounded-lg transition-colors flex items-center gap-1">
                            <ShareIcon c="w-5 h-5"/>
                            <span className="text-xs font-bold hidden sm:inline">Compartir</span>
                        </button>
                    )}
                    {roomCode && (
                        <button onClick={exitRoom} className="text-slate-400 hover:text-red-400 p-2 rounded-lg transition-colors flex items-center gap-1">
                            <ExitIcon c="w-5 h-5"/>
                            <span className="text-xs font-bold hidden sm:inline">Salir</span>
                        </button>
                    )}
                </div>
            </div>

            <div className="flex-1 p-6 pb-28 overflow-y-auto">
                {error && <div className="bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-xl mb-4 text-sm font-medium">{error}</div>}

                {/* ── INICIO ─────────────────────────────────────────── */}
                {gameState===GS.INICIO && (
                    <div className="fade-in flex flex-col gap-8 pt-10">
                        <div className="text-center">
                            <h2 className="text-4xl font-black mb-2 text-amber-300 title-font">¿Quién es?</h2>
                            <p className="text-slate-400 text-lg italic">Un infiltrado entre nosotros...</p>
                        </div>
                        <input type="text" placeholder="Tu Apodo" className="w-full bg-slate-800/60 p-4 rounded-2xl border-2 border-amber-900/40 text-center text-xl font-bold outline-none focus:border-amber-500 transition-colors text-amber-100" value={playerName} onChange={e=>setPlayerName(e.target.value)}/>
                        <div className="flex flex-col gap-3">
                            <button onClick={createRoom} disabled={!playerName} className="bg-amber-700 hover:bg-amber-600 p-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 disabled:opacity-50 title-font text-amber-100 transition-colors">CREAR NUEVA SALA</button>
                            <div className="flex items-center gap-4 py-2 opacity-30"><div className="flex-1 h-px bg-amber-700"/><span className="text-xs text-amber-300">O INGRESA CON CÓDIGO</span><div className="flex-1 h-px bg-amber-700"/></div>
                            <div className="flex gap-2">
                                <input type="text" placeholder="CÓDIGO" maxLength={4} className="w-1/3 bg-slate-800/60 p-4 rounded-2xl border-2 border-slate-700 text-center font-black uppercase outline-none focus:border-emerald-500 text-white" value={roomCodeInput} onChange={e=>setRoomCodeInput(e.target.value)}/>
                                <button onClick={joinRoom} disabled={!playerName||roomCodeInput.length<4} className="flex-1 bg-emerald-700 hover:bg-emerald-600 p-4 rounded-2xl font-black active:scale-95 disabled:opacity-50 transition-colors">UNIRSE A SALA</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── LOBBY ──────────────────────────────────────────── */}
                {gameState===GS.LOBBY && roomData && (
                    <div className="fade-in space-y-6">
                        <div className="border border-amber-800/40 p-6 rounded-[2rem] text-center" style={{background:'rgba(120,80,10,.08)'}}>
                            <p className="text-xs font-bold text-amber-500 uppercase mb-1 tracking-widest">Código de Sala</p>
                            <p className="text-5xl font-black tracking-widest text-amber-100 title-font">{roomData.code}</p>
                            <button onClick={()=>shareCode(roomData.code)} className="mt-3 flex items-center gap-2 mx-auto text-amber-400 hover:text-amber-300 text-sm font-bold transition-colors">
                                <ShareIcon c="w-4 h-4"/> Compartir sala
                            </button>
                        </div>
                        <div className="space-y-3">
                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Jugadores ({roomData.players.length})</p>
                            {roomData.players.map(p=>(
                                <div key={p.id} className="bg-slate-800/40 p-4 rounded-2xl flex justify-between items-center border border-slate-700/50">
                                    <span className="font-bold flex items-center gap-2 text-amber-100">
                                        {p.id===roomData.hostId&&<CrownIcon c="w-4 h-4 text-amber-400"/>}
                                        {p.name} {p.id===myId?'(Tú)':''}
                                    </span>
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_#10b981]"/>
                                </div>
                            ))}
                        </div>
                        {isHost && (
                            <div className="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 space-y-3 mb-20">
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Juegos de la Ronda</p>
                                <div className="flex gap-2">
                                    <input type="text" placeholder="Ej. Verdad o Reto" className="flex-1 bg-slate-900 p-3 rounded-xl border border-slate-700 text-sm outline-none focus:border-amber-500 text-white" value={newGameName} onChange={e=>setNewGameName(e.target.value)} onKeyPress={e=>e.key==='Enter'&&addGame()}/>
                                    <button onClick={addGame} className="bg-amber-700 hover:bg-amber-600 px-4 py-2 rounded-xl font-bold active:scale-95 text-sm transition-colors">Añadir</button>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {(roomData.games||[]).map((game,i)=>(
                                        <div key={i} className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-2 text-amber-200">
                                            {game}
                                            <button onClick={()=>removeGame(i)} className="text-red-400 hover:text-red-300"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {isHost && (
                            <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                                <button onClick={startGame} disabled={roomData.players.length<2} className="w-full bg-amber-700 hover:bg-amber-600 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 disabled:opacity-50 title-font transition-colors">COMENZAR PARTIDA</button>
                            </div>
                        )}
                    </div>
                )}

                {/* ── JUGANDO ────────────────────────────────────────── */}
                {gameState===GS.JUGANDO && roomData && (
                    <>
                        {roomData.currentGame&&<p className="text-center text-sm text-slate-400 mb-4">Juego: <span className="font-bold text-amber-200">{roomData.currentGame}</span></p>}
                        {isHost && roomData.currentGame && (
                            <div className="mb-4 space-y-2">
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Ganador del juego</p>
                                {alive.map(p=>(
                                    <button key={p.id} onClick={()=>upd({roundWinner:p.id,immunePlayerId:p.id})}
                                        className={`w-full p-4 rounded-2xl border-2 transition-all flex justify-between items-center ${roomData.immunePlayerId===p.id?'border-amber-500 bg-amber-500/10':'border-slate-700 bg-slate-800/50'}`}>
                                        <span className={`font-bold ${roomData.immunePlayerId===p.id?'text-amber-300':'text-slate-200'}`}>{p.name}</span>
                                        {roomData.immunePlayerId===p.id&&<AwardIcon c="w-5 h-5 text-amber-400"/>}
                                    </button>
                                ))}
                            </div>
                        )}
                        <div className="fade-in space-y-8 py-4 flex flex-col items-center">
                            {amIAlive ? (
                                <div className="w-full">
                                    <div className="bg-slate-800/80 p-8 rounded-[2rem] border-2 border-slate-700 shadow-2xl text-center cursor-pointer select-none"
                                        onPointerDown={()=>setIsRevealingRole(true)} onPointerUp={()=>setIsRevealingRole(false)} onPointerLeave={()=>setIsRevealingRole(false)}>
                                        {isRevealingRole ? (amIChosen ? (
                                            <div className="fade-in"><EyeOffIcon c="mx-auto text-red-500 mb-4 w-20 h-20 animate-pulse"/><h2 className="text-3xl font-black text-red-400 title-font">ERES EL ELEGIDO</h2><p className="text-slate-300 mt-2 text-sm italic">Finge inocencia. Engaña a todos.</p></div>
                                        ) : (
                                            <div className="fade-in"><UserIcon c="mx-auto text-blue-400 mb-4 w-20 h-20"/><h2 className="text-3xl font-black text-blue-400 title-font">ERES INOCENTE</h2><p className="text-slate-300 mt-2 text-sm italic">Observa y encuentra al culpable.</p></div>
                                        )) : (
                                            <div className="py-6"><EyeIcon c="mx-auto text-slate-500 mb-4 w-16 h-16"/><h2 className="text-2xl font-black text-slate-200">MANTÉN PRESIONADO</h2><p className="text-slate-400 text-sm mt-2 italic">Para ver tu rol en secreto</p></div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-4 opacity-60 text-center"><GhostIcon c="mx-auto text-slate-500 mb-4 w-20 h-20"/><h2 className="text-3xl font-black title-font">ESTÁS MUERTO</h2><p className="text-slate-400 italic">Usa el chat de fantasmas.</p></div>
                            )}
                            {(!amIAlive||(amIAlive&&amIChosen))&&(
                                <div className="bg-slate-900 border-2 border-slate-700 rounded-2xl flex flex-col h-[280px] w-full">
                                    <div className="bg-slate-800 p-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 flex items-center gap-2 border-b border-slate-700">
                                        <MsgIcon c="w-4 h-4"/>{amIChosen?"Mensajes del más allá (Solo tú los ves)":"Chat de Fantasmas"}
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                        {roomData.ghostMessages?.map((m,i)=>(
                                            <div key={i} className="ghost-msg bg-slate-800/80 p-3 rounded-xl text-sm">
                                                <span className="text-red-400 font-bold">{m.sender}: </span><span className="text-slate-200">{m.text}</span>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef}/>
                                    </div>
                                    {!amIAlive&&(
                                        <div className="p-2 border-t border-slate-700 flex gap-2">
                                            <input type="text" placeholder="Mensaje..." className="flex-1 bg-slate-800 px-4 py-2 rounded-xl text-sm outline-none text-white" value={ghostMessage} onChange={e=>setGhostMessage(e.target.value)} onKeyPress={e=>e.key==='Enter'&&sendGhostMessage()}/>
                                            <button onClick={sendGhostMessage} className="bg-amber-700 px-4 py-2 rounded-xl"><SendIcon c="w-4 h-4 text-white"/></button>
                                        </div>
                                    )}
                                </div>
                            )}
                            {isHost&&(
                                <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                                    <button onClick={startVoting} className="w-full bg-slate-200 text-slate-900 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 title-font">INICIAR VOTACIÓN</button>
                                </div>
                            )}
                        </div>
                    </>
                )}

                {/* ── VOTACION ───────────────────────────────────────── */}
                {gameState===GS.VOTACION && roomData && (
                    <div className="fade-in space-y-6">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-black title-font text-amber-100">ELIMINACIÓN</h2>
                            <p className="text-slate-400 text-sm italic mt-1">¿A quién vas a expulsar?</p>
                        </div>
                        <div className="grid gap-3 pb-20">
                            {roomData.players.filter(p=>p.isAlive&&p.id!==roomData.immunePlayerId).map(p=>(
                                <button key={p.id} onClick={()=>castVote(p.id)} disabled={!amIAlive}
                                    className={`p-5 rounded-2xl border-2 transition-all flex justify-between items-center ${roomData.votes?.[myId]===p.id?'border-amber-500 bg-amber-500/10':'border-slate-700 bg-slate-800/50 hover:bg-slate-800'}`}>
                                    <span className="font-bold text-lg text-amber-100">{p.name}{p.id===myId?' (Tú)':''}</span>
                                    {roomData.votes?.[myId]===p.id&&<CheckIcon c="w-5 h-5 text-amber-400"/>}
                                </button>
                            ))}
                        </div>
                        <div className="text-center text-slate-500 font-bold text-xs fixed bottom-24 left-0 right-0 z-30">
                            VOTOS: {Object.keys(roomData.votes||{}).length} / {roomData.players.filter(p=>p.isAlive&&p.id!==roomData.immunePlayerId).length}
                        </div>
                        {isHost&&(
                            <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                                <button onClick={finishVoting} className="w-full bg-emerald-700 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 title-font">CONTAR VOTOS</button>
                            </div>
                        )}
                    </div>
                )}

                {/* ── RESULTADOS ─────────────────────────────────────── */}
                {gameState===GS.RESULTADOS && roomData && (
                    <div className="fade-in text-center space-y-8 pt-10">
                        <div className="bg-slate-800/80 p-8 rounded-[3rem] border border-slate-700 shadow-2xl">
                            <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">El pueblo ha decidido</p>
                            <h2 className="text-2xl font-black leading-tight text-amber-100">{roomData.lastResult}</h2>
                        </div>
                        {alive.length===3&&(
                            <div className="bg-amber-900/20 border border-amber-700/50 p-4 rounded-2xl">
                                <p className="text-amber-300 font-black text-lg title-font">⚠ RONDA FINAL</p>
                                <p className="text-amber-200/70 text-sm mt-1 italic">Quedan 3 jugadores. Se activará la Ronda del Cofre del Tesoro.</p>
                            </div>
                        )}
                        <div className="flex flex-wrap justify-center gap-2 pb-20">
                            {roomData.players.map(p=>(
                                <div key={p.id} className={`px-4 py-2 rounded-full text-xs font-bold border ${p.isAlive?'bg-slate-800 border-slate-600 text-amber-100':'bg-red-900/30 border-red-500/50 text-red-400 line-through'}`}>{p.name}</div>
                            ))}
                        </div>
                        {isHost ? (
                            <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                                <button onClick={handleNextRound} className="w-full bg-amber-700 hover:bg-amber-600 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 title-font transition-colors">CONTINUAR</button>
                            </div>
                        ) : (
                            <p className="text-slate-500 animate-pulse font-bold fixed bottom-10 left-0 right-0 text-center">Esperando al anfitrión...</p>
                        )}
                    </div>
                )}

                {/* ── COFRE_NOTIFY ────────────────────────────────────── */}
                {gameState===GS.COFRE_NOTIFY && roomData && (
                    <CofreNotify
                        myId={myId} isHost={isHost} roomData={roomData}
                        amIChosen={amIChosen} roomCode={roomCode}
                        onReady={elegidoConfirmReady} onProceed={proceedToSetup}
                    />
                )}

                {/* ── COFRE_SETUP ─────────────────────────────────────── */}
                {gameState===GS.COFRE_SETUP && roomData && (
                    <CofreSetup
                        myId={myId} isHost={isHost} roomData={roomData}
                        alive={alive} getName={getName}
                        setChestTurnOrder={setChestTurnOrder}
                        startMinijuego={startMinijuego}
                    />
                )}

                {/* ── COFRE_MINIJUEGO ─────────────────────────────────── */}
                {gameState===GS.COFRE_MINIJUEGO && roomData && (
                    <CofreMinijuego
                        myId={myId} isHost={isHost} roomData={roomData}
                        alive={alive} getName={getName}
                        triggerGo={triggerGo} recordTap={recordTap}
                        finishMinijuego={finishMinijuego}
                    />
                )}

                {/* ── COFRE_TURNO ─────────────────────────────────────── */}
                {gameState===GS.COFRE_TURNO && roomData && (
                    <CofreTurno
                        myId={myId} isHost={isHost} roomData={roomData}
                        alive={alive} getName={getName}
                        isMyChestTurn={isMyChestTurn}
                        currentTurnPlayerId={currentTurnPlayerId}
                        keepChest={keepChest} swapChest={swapChest}
                        selectingSwapTarget={selectingSwapTarget}
                        setSelectingSwapTarget={setSelectingSwapTarget}
                    />
                )}

                {/* ── COFRE_FINAL ─────────────────────────────────────── */}
                {gameState===GS.COFRE_FINAL && roomData && (
                    <CofreFinal
                        myId={myId} isHost={isHost} roomData={roomData}
                        getName={getName} backToLobby={backToLobby}
                    />
                )}
            </div>
        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════
// COFRE_NOTIFY  –  El Elegido ve su rol antes de la ronda de cofres
// ════════════════════════════════════════════════════════════════════════
function CofreNotify({ myId, isHost, roomData, amIChosen, roomCode, onReady, onProceed }) {
    const [revealing, setRevealing] = useState(false);
    const [hasSeen, setHasSeen] = useState(false);

    const handlePointerDown = () => { setRevealing(true); };
    const handlePointerUp = () => { setRevealing(false); if (!hasSeen) setHasSeen(true); };

    return (
        <div className="fade-in flex flex-col items-center gap-6 pt-6 text-center">
            <div className="flex justify-center">
                <ChestSVG open={true} hasMoney={false} revealed={false} size={80}/>
            </div>
            <h2 className="text-3xl font-black text-amber-300 title-font">RONDA FINAL</h2>
            <p className="text-slate-400 italic text-sm max-w-xs mx-auto">
                Quedan 3 jugadores. Antes de la ronda del cofre, el Elegido debe conocer su rol.
            </p>

            {amIChosen ? (
                <div className="w-full space-y-4">
                    <div className="bg-amber-900/20 border border-amber-700/40 p-3 rounded-xl text-sm text-amber-200/80 italic">
                        Mantén presionado el botón para ver tu rol en privado. Luego confirma que ya viste.
                    </div>
                    <div
                        className={`p-8 rounded-[2rem] border-2 cursor-pointer select-none transition-all ${revealing?'border-red-500 bg-red-900/30':'border-slate-700 bg-slate-800/60'}`}
                        onPointerDown={handlePointerDown} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}
                    >
                        {revealing ? (
                            <div className="fade-in">
                                <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-red-500/20 border-2 border-red-500 elegido-pulse flex items-center justify-center">
                                    <EyeOffIcon c="w-8 h-8 text-red-400"/>
                                </div>
                                <h3 className="text-2xl font-black text-red-400 title-font">ERES EL ELEGIDO</h3>
                                <p className="text-slate-300 text-sm mt-2 italic">Tu cofre tiene el dinero al comenzar.<br/>¡Pero los demás intentarán robártelo!</p>
                            </div>
                        ) : (
                            <div>
                                <EyeIcon c="mx-auto text-slate-500 mb-4 w-12 h-12"/>
                                <p className="text-slate-300 font-black">MANTÉN PRESIONADO</p>
                                <p className="text-slate-500 text-sm mt-1 italic">Para ver tu rol en secreto</p>
                            </div>
                        )}
                    </div>
                    {hasSeen && !roomData.cofreElegidoReady && (
                        <button onClick={onReady} className="w-full bg-emerald-700 hover:bg-emerald-600 p-4 rounded-2xl font-black active:scale-95 title-font transition-colors">
                            ✓ YA VI MI ROL
                        </button>
                    )}
                    {roomData.cofreElegidoReady && (
                        <div className="bg-emerald-900/30 border border-emerald-700/50 p-3 rounded-xl text-emerald-300 font-bold text-sm">
                            ✓ Listo. Esperando al anfitrión...
                        </div>
                    )}
                </div>
            ) : (
                <div className="w-full space-y-4">
                    <div className={`p-6 rounded-2xl border-2 text-center transition-all ${roomData.cofreElegidoReady?'border-emerald-600/50 bg-emerald-900/20':'border-slate-700 bg-slate-800/40'}`}>
                        {roomData.cofreElegidoReady ? (
                            <>
                                <div className="text-3xl mb-2">✅</div>
                                <p className="text-emerald-300 font-black">El Elegido ya vio su rol</p>
                                <p className="text-slate-400 text-sm italic mt-1">El anfitrión puede continuar</p>
                            </>
                        ) : (
                            <>
                                <div className="text-3xl mb-2 animate-pulse">🔒</div>
                                <p className="text-slate-300 font-bold">El Elegido está viendo su rol...</p>
                                <p className="text-slate-500 text-sm italic mt-1">Espera a que confirme</p>
                            </>
                        )}
                    </div>
                </div>
            )}

            {isHost && roomData.cofreElegidoReady && (
                <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                    <button onClick={onProceed} className="w-full bg-amber-700 hover:bg-amber-600 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 title-font transition-colors">
                        CONTINUAR → COFRES
                    </button>
                </div>
            )}
            {!isHost && !amIChosen && (
                <p className="text-slate-500 animate-pulse font-bold text-sm">Esperando al anfitrión...</p>
            )}
        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════
// COFRE_SETUP  –  Host elige: manual o minijuego
// ════════════════════════════════════════════════════════════════════════
function CofreSetup({ myId, isHost, roomData, alive, getName, setChestTurnOrder, startMinijuego }) {
    const [mode, setMode] = useState(null); // 'manual' | 'minijuego'
    const [order, setOrder] = useState([]);

    const togglePlayer = (id) => {
        if (order.includes(id)) setOrder(order.filter(x=>x!==id));
        else setOrder([...order, id]);
    };

    if (!isHost) {
        return (
            <div className="fade-in flex flex-col items-center gap-6 pt-10 text-center">
                <ChestSVG open={true} hasMoney={false} revealed={false} size={90}/>
                <h2 className="text-3xl font-black text-amber-300 title-font">RONDA DEL TESORO</h2>
                <p className="text-slate-400 italic">El anfitrión está configurando la ronda...</p>
                <div className="animate-pulse text-amber-400 text-4xl">⏳</div>
            </div>
        );
    }

    return (
        <div className="fade-in space-y-6 pt-4">
            <div className="text-center space-y-2">
                <div className="flex justify-center mb-3"><ChestSVG open={true} hasMoney={false} revealed={false} size={80}/></div>
                <h2 className="text-3xl font-black text-amber-300 title-font">RONDA DEL TESORO</h2>
                <p className="text-slate-400 italic text-sm">¿Cómo se decide el orden en que eligen cofre?</p>
            </div>

            <div className="bg-amber-900/10 border border-amber-800/30 p-3 rounded-xl text-xs text-amber-200/70 italic text-center">
                🏴 El Elegido comienza con el dinero. Nadie sabe qué cofre es cuál. El primero en elegir puede intercambiar con alguien, y así sucesivamente.
            </div>

            {!mode && (
                <div className="grid gap-4 mt-4">
                    <button onClick={()=>setMode('minijuego')}
                        className="p-6 rounded-2xl border-2 border-amber-700 bg-amber-900/20 text-center active:scale-95 transition-all hover:border-amber-500">
                        <div className="text-3xl mb-2">⚡</div>
                        <p className="font-black text-amber-200 text-lg title-font">MINIJUEGO</p>
                        <p className="text-slate-400 text-sm italic mt-1">Juego de reacción: el perdedor elige primero, el ganador elige último</p>
                    </button>
                    <button onClick={()=>setMode('manual')}
                        className="p-6 rounded-2xl border-2 border-slate-700 bg-slate-800/40 text-center active:scale-95 transition-all hover:border-slate-500">
                        <div className="text-3xl mb-2">📋</div>
                        <p className="font-black text-slate-200 text-lg title-font">MANUAL</p>
                        <p className="text-slate-400 text-sm italic mt-1">El anfitrión decide el orden de los turnos</p>
                    </button>
                </div>
            )}

            {mode==='minijuego' && (
                <div className="space-y-4">
                    <button onClick={()=>setMode(null)} className="text-slate-500 hover:text-slate-300 text-sm">← Volver</button>
                    <div className="bg-amber-900/20 border border-amber-700/40 p-5 rounded-2xl text-center space-y-3">
                        <div className="text-4xl">⚡</div>
                        <p className="font-black text-amber-200 text-lg title-font">JUEGO DE REACCIÓN</p>
                        <p className="text-slate-300 text-sm italic">Aparecerá una señal. ¡Toca la pantalla lo más rápido posible!</p>
                        <div className="text-xs text-slate-500 space-y-1 pt-2">
                            <p>🥇 Más rápido → elige <span className="text-amber-400 font-bold">ÚLTIMO</span> (ventaja)</p>
                            <p>🥉 Más lento → elige <span className="text-red-400 font-bold">PRIMERO</span></p>
                        </div>
                    </div>
                    <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                        <button onClick={startMinijuego} className="w-full bg-amber-600 hover:bg-amber-500 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 title-font transition-colors">
                            ⚡ INICIAR MINIJUEGO
                        </button>
                    </div>
                </div>
            )}

            {mode==='manual' && (
                <div className="space-y-4">
                    <button onClick={()=>setMode(null)} className="text-slate-500 hover:text-slate-300 text-sm">← Volver</button>
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Toca los jugadores en orden de turno</p>
                    <p className="text-slate-400 text-sm italic">El primero que toques será el primero en elegir.</p>
                    <div className="flex gap-2 flex-wrap min-h-[44px] bg-slate-800/40 rounded-xl p-3 border border-slate-700">
                        {order.length===0&&<span className="text-slate-600 text-sm italic">Selecciona jugadores...</span>}
                        {order.map((id,i)=>(
                            <div key={id} className="bg-amber-800/60 border border-amber-700/50 px-3 py-1 rounded-full text-xs font-bold text-amber-200 flex items-center gap-1">
                                <span className="text-amber-400">{i+1}.</span> {getName(id)}
                                <button onClick={()=>setOrder(order.filter(x=>x!==id))} className="ml-1 text-red-400 text-xs">✕</button>
                            </div>
                        ))}
                    </div>
                    <div className="grid gap-2">
                        {alive.map(p=>(
                            <button key={p.id} onClick={()=>togglePlayer(p.id)} disabled={order.includes(p.id)}
                                className={`p-4 rounded-xl border-2 font-bold transition-all text-left flex justify-between items-center ${order.includes(p.id)?'border-amber-700/50 bg-amber-900/20 text-amber-500 opacity-60':'border-slate-700 bg-slate-800/50 text-amber-100 hover:border-amber-700'}`}>
                                <span>{p.name}{p.id===myId?' (Tú)':''}</span>
                                {order.includes(p.id)&&<span className="text-amber-400 text-sm">#{order.indexOf(p.id)+1}</span>}
                            </button>
                        ))}
                    </div>
                    <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                        <button onClick={()=>setChestTurnOrder(order)} disabled={order.length!==alive.length}
                            className="w-full bg-amber-700 hover:bg-amber-600 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 disabled:opacity-40 title-font transition-colors">
                            INICIAR RONDA DE COFRES
                        </button>
                    </div>
                </div>
            )}
        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════
// COFRE_MINIJUEGO  –  Juego de reacción para determinar el orden
// ════════════════════════════════════════════════════════════════════════
function CofreMinijuego({ myId, isHost, roomData, alive, getName, triggerGo, recordTap, finishMinijuego }) {
    const [localCountdown, setLocalCountdown] = useState(3);
    const [hasTriggeredGo, setHasTriggeredGo] = useState(false);
    const [hasTapped, setHasTapped] = useState(false);
    const [myReactionTime, setMyReactionTime] = useState(null);
    const mj = roomData.cofreMinijuego || {};
    const phase = mj.phase;
    const taps = mj.taps || {};

    // Countdown on host side
    useEffect(() => {
        if (phase !== 'countdown' || !isHost || !mj.startedAt) return;
        let count = 3;
        setLocalCountdown(3);
        const iv = setInterval(() => {
            count--;
            setLocalCountdown(count);
            if (count <= 0) {
                clearInterval(iv);
                // Random delay 1-3s then trigger GO
                const delay = 1000 + Math.random() * 2000;
                setTimeout(() => { triggerGo(); setHasTriggeredGo(true); }, delay);
            }
        }, 1000);
        return () => clearInterval(iv);
    }, [phase, mj.startedAt, isHost]);

    // Non-host countdown sync (visual only)
    const [nonHostCount, setNonHostCount] = useState(3);
    useEffect(() => {
        if (phase !== 'countdown' || isHost || !mj.startedAt) return;
        const elapsed = Date.now() - mj.startedAt;
        let startCount = Math.max(1, 3 - Math.floor(elapsed / 1000));
        setNonHostCount(startCount);
        let c = startCount;
        const iv = setInterval(() => {
            c--;
            setNonHostCount(c);
            if (c <= 0) clearInterval(iv);
        }, 1000);
        return () => clearInterval(iv);
    }, [phase, mj.startedAt, isHost]);

    const handleTap = () => {
        if (phase !== 'go' || hasTapped || taps[myId]) return;
        setHasTapped(true);
        const rt = Date.now() - mj.goTime;
        setMyReactionTime(rt);
        recordTap();
    };

    const allTapped = alive.every(p => taps[p.id]);
    const displayCount = isHost ? localCountdown : nonHostCount;

    // Results sorted: fastest first
    const results = alive
        .map(p=>({id:p.id, name:getName(p.id), rt:taps[p.id]??null}))
        .sort((a,b)=>(a.rt??99999)-(b.rt??99999));

    return (
        <div className="fade-in flex flex-col items-center gap-6 pt-6 text-center">
            <h2 className="text-3xl font-black text-amber-300 title-font">⚡ MINIJUEGO</h2>

            {phase === 'countdown' && (
                <div className="space-y-6">
                    <p className="text-slate-400 italic text-sm">Prepárate... ¡toca cuando aparezca la señal!</p>
                    <div className="w-40 h-40 mx-auto rounded-full border-4 border-amber-700 bg-amber-900/20 flex items-center justify-center" style={{boxShadow:'0 0 30px rgba(217,119,6,.3)'}}>
                        <span className="text-7xl font-black text-amber-300 title-font countdown-num" key={displayCount}>{displayCount > 0 ? displayCount : '...'}</span>
                    </div>
                    <p className="text-slate-500 text-sm italic animate-pulse">Espera la señal...</p>
                </div>
            )}

            {phase === 'go' && !allTapped && (
                <div className="space-y-6 w-full">
                    <div className="go-signal bg-amber-400 text-amber-900 text-5xl font-black py-6 rounded-2xl title-font shadow-[0_0_40px_rgba(251,191,36,.5)]">
                        ¡¡YA!!
                    </div>
                    {!hasTapped ? (
                        <button onPointerDown={handleTap}
                            className="tap-btn w-full h-40 bg-amber-600 hover:bg-amber-500 rounded-[2rem] text-3xl font-black title-font shadow-2xl flex flex-col items-center justify-center gap-2 active:scale-95"
                            style={{boxShadow:'0 0 30px rgba(217,119,6,.4)'}}>
                            <span className="text-5xl">👆</span>
                            <span>¡TOCA!</span>
                        </button>
                    ) : (
                        <div className="bg-emerald-900/30 border border-emerald-700 p-6 rounded-2xl">
                            <div className="text-3xl mb-2">✅</div>
                            <p className="text-emerald-300 font-black text-xl">{myReactionTime}ms</p>
                            <p className="text-slate-400 text-sm italic mt-1">Esperando a los demás...</p>
                            <div className="flex justify-center gap-3 mt-4 flex-wrap">
                                {alive.map(p=>(
                                    <div key={p.id} className={`px-3 py-1 rounded-full text-xs font-bold ${taps[p.id]?'bg-emerald-900/50 border border-emerald-700 text-emerald-300':'bg-slate-800 border border-slate-700 text-slate-500 animate-pulse'}`}>
                                        {getName(p.id)} {taps[p.id]?'✓':'...'}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            )}

            {(phase === 'go' && allTapped) || phase === 'done' ? (
                <div className="w-full space-y-4">
                    <p className="text-amber-300 font-black text-xl title-font">RESULTADOS</p>
                    <div className="space-y-3">
                        {results.map((r,i)=>(
                            <div key={r.id} className={`result-row p-4 rounded-xl border-2 flex justify-between items-center ${i===0?'border-amber-500 bg-amber-900/20':i===results.length-1?'border-red-500/50 bg-red-900/10':'border-slate-700 bg-slate-800/40'}`} style={{animationDelay:`${i*0.1}s`}}>
                                <div className="flex items-center gap-3">
                                    <span className="text-2xl">{i===0?'🥇':i===1?'🥈':'🥉'}</span>
                                    <span className={`font-bold text-lg ${r.id===myId?'text-amber-300':'text-slate-200'}`}>{r.name}{r.id===myId?' (Tú)':''}</span>
                                </div>
                                <div className="text-right">
                                    <p className="font-black text-amber-200">{r.rt}ms</p>
                                    <p className="text-xs text-slate-500">{i===0?'→ elige último':i===results.length-1?'→ elige primero':'→ elige segundo'}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                    {isHost && (
                        <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                            <button onClick={finishMinijuego} className="w-full bg-amber-700 hover:bg-amber-600 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 title-font transition-colors">
                                CONTINUAR → ELEGIR COFRES
                            </button>
                        </div>
                    )}
                    {!isHost && <p className="text-slate-500 animate-pulse font-bold pb-10">Esperando al anfitrión...</p>}
                </div>
            ) : null}

            {/* Waiting for go (non-tappers) */}
            {phase === 'go' && !allTapped && !hasTapped && alive.every(p=>taps[p.id]!==undefined) && (
                <div className="text-center space-y-2">
                    <p className="text-slate-400 text-sm">Esperando tapeos...</p>
                </div>
            )}
        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════
// COFRE_TURNO  –  Jugadores eligen / intercambian cofres
// ════════════════════════════════════════════════════════════════════════
function CofreTurno({ myId, isHost, roomData, alive, getName, isMyChestTurn, currentTurnPlayerId, keepChest, swapChest, selectingSwapTarget, setSelectingSwapTarget }) {
    const totalTurns = roomData.chestTurnOrder?.length || 0;
    const currentIdx = roomData.chestCurrentTurnIndex || 0;

    return (
        <div className="fade-in space-y-6 pt-4">
            <div className="flex items-center justify-between mb-2">
                <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">Turno {currentIdx+1} de {totalTurns}</p>
                <div className="flex gap-1">
                    {Array.from({length:totalTurns}).map((_,i)=>(
                        <div key={i} className={`w-6 h-1.5 rounded-full ${i<currentIdx?'bg-amber-600':i===currentIdx?'bg-amber-400':'bg-slate-700'}`}/>
                    ))}
                </div>
            </div>
            <div className={`text-center p-4 rounded-2xl border-2 ${isMyChestTurn?'border-amber-500 bg-amber-900/20 turn-indicator':'border-slate-700 bg-slate-800/40'}`}>
                {isMyChestTurn ? (
                    <><p className="text-amber-400 font-black text-xl title-font">¡ES TU TURNO!</p><p className="text-slate-300 text-sm italic mt-1">¿Guardas tu cofre o lo intercambias?</p></>
                ) : (
                    <><p className="text-slate-400 text-sm uppercase tracking-widest font-bold">Turno de</p><p className="text-amber-200 font-black text-2xl title-font">{getName(currentTurnPlayerId)}</p></>
                )}
            </div>

            {/* Chests */}
            <div className="space-y-2">
                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">Cofres actuales</p>
                <div className="grid grid-cols-3 gap-3">
                    {roomData.chestOwners?.map((ownerId, chestIdx) => {
                        const isMyChest = ownerId === myId;
                        const isSwapTarget = selectingSwapTarget && ownerId !== myId && isMyChestTurn;
                        return (
                            <button key={chestIdx}
                                onClick={()=>{ if(isSwapTarget) swapChest(ownerId); }}
                                disabled={!isSwapTarget}
                                className={`flex flex-col items-center gap-2 p-3 rounded-2xl border-2 transition-all
                                    ${isMyChest?'border-amber-500 bg-amber-900/20':''}
                                    ${isSwapTarget?'border-emerald-500 bg-emerald-900/20 hover:scale-105 cursor-pointer':''}
                                    ${!isMyChest&&!isSwapTarget?'border-slate-700 bg-slate-800/40':''}
                                `}>
                                <ChestSVG open={false} hasMoney={false} revealed={false} size={64}/>
                                <div className="text-center">
                                    <p className={`text-xs font-bold truncate max-w-full ${isMyChest?'text-amber-300':'text-slate-300'}`}>{getName(ownerId)}</p>
                                    {isMyChest&&<p className="text-[10px] text-amber-500">TÚ</p>}
                                    {isSwapTarget&&<p className="text-[10px] text-emerald-400 font-bold">INTERCAMBIAR</p>}
                                </div>
                            </button>
                        );
                    })}
                </div>
            </div>

            {isMyChestTurn && !selectingSwapTarget && (
                <div className="grid grid-cols-2 gap-3 mt-4">
                    <button onClick={keepChest} className="bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 p-4 rounded-2xl text-center transition-all active:scale-95">
                        <div className="text-2xl mb-1">🔒</div>
                        <div className="text-sm font-black text-slate-200">CONSERVAR</div>
                        <div className="text-[10px] text-slate-400 italic">Quédate con tu cofre</div>
                    </button>
                    <button onClick={()=>setSelectingSwapTarget(true)} className="bg-amber-800/60 hover:bg-amber-700/60 border-2 border-amber-700 p-4 rounded-2xl text-center transition-all active:scale-95">
                        <div className="text-2xl mb-1">🔄</div>
                        <div className="text-sm font-black text-amber-200">INTERCAMBIAR</div>
                        <div className="text-[10px] text-amber-400/70 italic">Cambia con alguien</div>
                    </button>
                </div>
            )}
            {isMyChestTurn && selectingSwapTarget && (
                <div className="space-y-2 text-center">
                    <p className="text-emerald-400 font-bold text-sm">Toca el cofre con quien quieres intercambiar</p>
                    <button onClick={()=>setSelectingSwapTarget(false)} className="text-slate-500 text-sm hover:text-slate-300 py-2">Cancelar</button>
                </div>
            )}

            <div className="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Orden de turnos</p>
                <div className="space-y-2">
                    {roomData.chestTurnOrder?.map((pid,i)=>(
                        <div key={pid} className={`flex items-center gap-3 text-sm ${i===currentIdx?'text-amber-300 font-black':i<currentIdx?'text-slate-600 line-through':'text-slate-400'}`}>
                            <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-black ${i===currentIdx?'bg-amber-600 text-white':i<currentIdx?'bg-slate-700 text-slate-500':'bg-slate-800 text-slate-500'}`}>{i+1}</span>
                            {getName(pid)}{pid===myId?' (Tú)':''}
                            {i<currentIdx&&<span className="text-slate-600">✓</span>}
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════
// COFRE_FINAL  –  Revelar y ganador
// ════════════════════════════════════════════════════════════════════════
function CofreFinal({ myId, isHost, roomData, getName, backToLobby }) {
    const [revealed, setRevealed] = useState(false);
    const [animating, setAnimating] = useState(false);
    const winnerId = roomData.chestWinnerId;
    const winnerName = getName(winnerId);
    const isWinner = winnerId === myId;

    const handleReveal = () => {
        setAnimating(true);
        setTimeout(()=>{ setRevealed(true); setAnimating(false); }, 800);
    };

    return (
        <div className="fade-in flex flex-col items-center gap-6 pt-6 text-center">
            <h2 className="text-3xl font-black text-amber-300 title-font">MOMENTO DE LA VERDAD</h2>

                <>
                    <div className={`relative text-center p-6 rounded-[2rem] border-2 w-full ${isWinner?'border-amber-400 bg-amber-900/30 chest-glow-gold':'border-slate-700 bg-slate-800/40'}`}>
                        <div className="winner-rays absolute inset-0 rounded-[2rem] pointer-events-none opacity-60"/>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">¡EL GANADOR ES!</p>
                        <h3 className="text-4xl font-black text-amber-300 title-font mb-2">{winnerName}</h3>
                        {isWinner&&<p className="text-amber-200 italic text-lg">¡¡ERES TÚ!! 🎉</p>}

                    <div className="grid grid-cols-3 gap-3 w-full">

                                    {hasMoney&&<p className="text-[10px] text-amber-400 font-black">💰 DINERO</p>}
                                    {!hasMoney&&<p className="text-[10px] text-slate-600">vacío</p>}
                                    {ownerId===myId&&<p className="text-[10px] text-blue-400 font-bold">TÚ</p>}
                                </div>
                            );

                    </div>
                    {isHost ? (
                        <div className="fixed bottom-6 left-0 right-0 px-4 max-w-[500px] mx-auto z-40">
                            <button onClick={backToLobby} className="w-full bg-amber-700 hover:bg-amber-600 p-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 title-font transition-colors">VOLVER AL LOBBY</button>
                        </div>
                    ) : (
                        <p className="text-slate-500 animate-pulse font-bold pb-20">Esperando al anfitrión...</p>
                    )}
                </>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
